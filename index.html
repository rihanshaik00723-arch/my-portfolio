<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vet Clinic</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    .contact-pro {
      padding: 70px 20px;
      background: linear-gradient(135deg, #eef5ff, #f9fcff);
      font-family: 'Segoe UI', sans-serif;
    }

    .wrapper {
      max-width: 1100px;
      margin: auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      align-items: center;
    }

    .left {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      animation: fadeUp 0.8s ease;
    }

    .left h2 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .rating {
      color: #777;
      margin-bottom: 20px;
    }

    .details p {
      margin: 10px 0;
      color: #444;
    }

    .btn-group {
      margin-top: 25px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .btn {
      padding: 12px 20px;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      display: inline-block;
    }

    .btn.primary {
      background: linear-gradient(135deg, #28a745, #00c851);
      color: #fff;
      box-shadow: 0 8px 20px rgba(40,167,69,0.3);
    }

    .btn.primary:hover {
      transform: translateY(-3px);
    }

    .btn.call {
      background: #007bff;
      color: #fff;
    }

    .btn.call:hover {
      background: #0056b3;
    }

    .btn.whatsapp {
      background: #25D366;
      color: #fff;
    }

    .btn.whatsapp:hover {
      background: #1ebe5d;
    }

    .social {
      margin-top: 20px;
    }

    .social a {
      margin-right: 15px;
      color: #555;
      text-decoration: none;
    }

    .social a:hover {
      color: #000;
    }

    .right iframe {
      width: 100%;
      height: 400px;
      border: none;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }

    @media (max-width: 768px) {
      .wrapper {
        grid-template-columns: 1fr;
      }

      .btn {
        width: 100%;
        text-align: center;
      }

      .right iframe {
        height: 300px;
      }
    }
  </style>
</head>

<body>

<section class="contact-pro">
  <div class="wrapper">

    <div class="left">
      <h2>Clínica Veterinária De Francelos, Lda.</h2>
      <p class="rating">⭐ 4.5 (47 Reviews) • Emergency Veterinarian Service</p>

      <div class="details">
        <p>📍 Av. de Francelos 575, 4405-647 Vila Nova de Gaia, Portugal</p>
        <p>🕒 Open • Closes 8 PM</p>
        <p>📞 +351 22 093 0915</p>
      </div>

      <div class="btn-group">
        <a href="https://maps.app.goo.gl/TS9Q4yokdQJcrxYt5" target="_blank" class="btn primary">📍 Get Directions</a>
        <a href="tel:+351220930915" class="btn call">📞 Call Now</a>
        <a href="https://wa.me/351220930915" target="_blank" class="btn whatsapp">💬 WhatsApp</a>
      </div>

      <div class="social">
        <a href="https://www.cvfrancelos.pt/contactos.html" target="_blank">🌐 Website</a>
        <a href="https://www.facebook.com/Clinica.Veterinaria.Francelos/" target="_blank">Facebook</a>
        <a href="https://www.instagram.com/cvetfrancelos/" target="_blank">Instagram</a>
      </div>
    </div>

    <div class="right">
      <iframe src="https://www.google.com/maps?q=Clínica+Veterinária+De+Francelos&output=embed"></iframe>
    </div>

  </div>
</section>

</body>
</html>
